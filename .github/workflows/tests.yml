name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI — booking (lint + unit)
    runs-on: ubuntu-latest

    steps:
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/booking

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r vbwd-backend/requirements.txt

      - name: Style check — Black
        run: black --check --diff vbwd-backend/plugins/booking/ --exclude='/(\.git|__pycache__|\.pytest_cache)/'

      - name: Style check — Flake8
        run: flake8 vbwd-backend/plugins/booking/ --max-line-length=120 --extend-ignore=E203,W503 --exclude=.git,__pycache__,.pytest_cache

      - name: Style check — Mypy
        run: mypy vbwd-backend/plugins/booking/booking/ --ignore-missing-imports --no-error-summary --python-version=3.11 || true

      - name: Run unit tests
        working-directory: vbwd-backend
        run: |
          if [ -d "plugins/booking/tests/unit" ]; then
            python -m pytest plugins/booking/tests/unit/ -v --tb=short
          else
            echo "No unit tests yet"
          fi

  integration:
    name: Integration — booking
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/booking

      - name: Clone CMS plugin (booking resource_image FK depends on cms_image)
        run: git clone --depth=1 -q https://github.com/VBWD-platform/vbwd-plugin-cms.git vbwd-backend/plugins/cms || true

      - name: Clone email plugin (booking email tests depend on email plugin)
        run: git clone --depth=1 -q https://github.com/VBWD-platform/vbwd-plugin-email.git vbwd-backend/plugins/email || true

      - name: Create plugins.json (enable booking + dependencies)
        run: |
          echo '{"plugins":{"booking":{"enabled":true,"version":"1.0.0","source":"local"},"cms":{"enabled":true,"version":"1.0.0","source":"local"},"email":{"enabled":true,"version":"1.0.0","source":"local"},"subscription":{"enabled":true,"version":"1.0.0","source":"local"}}}' > vbwd-backend/plugins/plugins.json

      - name: Start services
        working-directory: vbwd-backend
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/api/v1/health > /dev/null 2>&1 && break
            sleep 2
          done
          curl -sf http://localhost:5000/api/v1/health || exit 1

      - name: Seed test data
        working-directory: vbwd-backend
        run: docker compose exec -T api flask seed-test-data || true

      - name: Run integration tests
        working-directory: vbwd-backend
        run: |
          if [ -d "plugins/booking/tests/integration" ]; then
            docker compose run --rm test pytest plugins/booking/tests/integration/ -v --tb=short
          else
            echo "No integration tests yet — skipping"
          fi

      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v

  e2e:
    name: E2E — booking (Playwright)
    needs: integration
    runs-on: ubuntu-latest

    steps:
      # ── Backend ────────────────────────────────────────────────────────
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          ref: main
          path: vbwd-backend

      - name: Clone backend booking plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/booking

      - name: Clone backend dependencies (CMS, email, subscription)
        run: |
          for plugin in cms email subscription; do
            git clone --depth=1 -q https://github.com/VBWD-platform/vbwd-plugin-${plugin}.git vbwd-backend/plugins/${plugin} || true
          done

      - name: Create backend plugins.json
        run: |
          python3 -c "
          import json, os
          plugins = {}
          for d in os.listdir('vbwd-backend/plugins'):
              if os.path.isfile(os.path.join('vbwd-backend/plugins', d, '__init__.py')):
                  plugins[d] = {'enabled': True, 'version': '1.0.0', 'source': 'local'}
          json.dump({'plugins': plugins}, open('vbwd-backend/plugins/plugins.json', 'w'))
          print(f'plugins.json: {sorted(plugins.keys())}')
          "

      - name: Start backend services
        working-directory: vbwd-backend
        run: docker compose up -d --build

      - name: Wait for backend API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/api/v1/health > /dev/null 2>&1 && break
            sleep 2
          done
          curl -sf http://localhost:5000/api/v1/health || exit 1

      - name: Run migrations + seed
        working-directory: vbwd-backend
        run: |
          docker compose exec -T api alembic upgrade head || true
          docker compose exec -T api flask seed-test-data || docker compose exec -T api python -c "
          import os; os.environ['TEST_DATA_SEED']='true'
          from vbwd.app import create_app
          app = create_app()
          with app.app_context():
              from vbwd.testing.test_data_seeder import TestDataSeeder
              from vbwd.extensions import db
              TestDataSeeder(db.session).seed()
          " || true

      # ── Frontend ───────────────────────────────────────────────────────
      - name: Clone vbwd-fe-admin
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-admin
          ref: main
          path: vbwd-fe-admin
          submodules: recursive

      - name: Clone fe-admin booking plugin
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-admin-plugin-booking
          ref: main
          path: vbwd-fe-admin/plugins/booking

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-admin/package-lock.json

      - name: Build fe-core submodule
        working-directory: vbwd-fe-admin/vbwd-fe-core
        run: npm install && npm run build

      - name: Install fe-admin dependencies
        working-directory: vbwd-fe-admin
        run: npm install

      - name: Install ALL fe-admin plugins
        working-directory: vbwd-fe-admin/plugins
        run: |
          for entry in "analytics-widget:vbwd-fe-admin-plugin-analytics-widget" "cms-admin:vbwd-fe-admin-plugin-cms" "email-admin:vbwd-fe-admin-plugin-email" "ghrm-admin:vbwd-fe-admin-plugin-ghrm" "taro-admin:vbwd-fe-admin-plugin-taro" "subscription-admin:vbwd-fe-admin-plugin-subscription" "shop-admin:vbwd-fe-admin-plugin-shop" "discount-admin:vbwd-fe-admin-plugin-discount"; do
            name="${entry%%:*}"; repo="${entry##*:}"
            [ -d "$name" ] && continue
            git clone --depth=1 -q "https://github.com/VBWD-platform/${repo}.git" "$name" 2>/dev/null || {
              echo "Creating stub for $name"
              mkdir -p "$name"
              echo "export const ${name//-/}Plugin = { name: '${name}', version: '0.0.0', install() {}, activate() {}, deactivate() {} };" > "$name/index.ts"
            }
          done

      - name: Install Playwright browsers
        working-directory: vbwd-fe-admin
        run: npx playwright install --with-deps chromium

      - name: Start fe-admin dev server
        working-directory: vbwd-fe-admin
        run: npm run dev -- --host &

      - name: Wait for fe-admin dev server
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:5173/ > /dev/null 2>&1 && break
            sleep 2
          done
          curl -sf http://localhost:5173/ || exit 1

      # ── Run tests ─────────────────────────────────────────────────────
      - name: Run Playwright e2e tests
        working-directory: vbwd-fe-admin
        run: E2E_BASE_URL=http://localhost:5173 npx playwright test plugins/booking/tests/e2e/ --config=playwright.platform.config.ts --reporter=list

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: vbwd-fe-admin/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v
